paths:
  db_dir: db
  out_dir: output_ai
  site_infos_file: Sites_Shyrka_Infos.xlsx

level_defaults:
  site:
    id_cols: [siteId]
    date_col: date
    hist_file: sitehist.csv
    pred_file: sitepred.csv
    weath_file: siteweath.csv
  zone:
    id_cols: [siteId, zoneId]
    date_col: date
    hist_file: zonehist.csv
    pred_file: zonepred.csv
    weath_file: siteweath.csv

features:
  lags: [1, 2, 7, 14]
  rolling_windows: [7, 14, 30]
  add_calendar: true
  add_site_id: true
  weather_cols: [tempAmb, humidity, djF, djC, tempMin, tempMax, chancePluie, windSpeed]
  static_cols: [surface_m2]

model:
  type: ridge   # ridge | hist_gbdt
  ridge:
    alpha: 1.0
  hist_gbdt:
    max_depth: 8
    learning_rate: 0.08
    max_iter: 350
    l2_regularization: 0.0

training:
  valid_days: 60

prediction:
  days: null
